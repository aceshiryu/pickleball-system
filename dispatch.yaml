# App Engine hostname routing for the demo deployment.
#
# Deployed on its own, after the services exist:
#   gcloud app deploy dispatch.yaml --project=pickleball-system-502915
#
# Each custom domain must already be mapped to the App Engine app
# (`gcloud app domain-mappings create demo-api.bookly-ph.com`) and its DNS
# records created, or these rules match nothing.
#
# Rules are evaluated top to bottom and the FIRST match wins. Anything that
# matches no rule falls through to `default`, which is the customer web app.

dispatch:
  # --- API ---------------------------------------------------------------
  # NestJS, serving under the /api prefix (Swagger at /api-docs).
  - url: 'demo-api.bookly-ph.com/*'
    service: pickleball-api

  # --- Admin console -------------------------------------------------------
  # apps/admin — the real facility console (courts, bookings, approvals,
  # settings). Staff sign in with email + password at /login; the console is
  # the root. Shares its store + UI with the customer app via libs/web-shared.
  - url: 'demo-admin.bookly-ph.com/*'
    service: pickleball-admin

  # --- Customer app ------------------------------------------------------
  # apps/web — customer booking only. The admin console no longer lives here.
  - url: 'demo.bookly-ph.com/*'
    service: default
