runtime: nodejs22
service: pickleball-admin
instance_class: F2

# App Engine entrypoint: Next standalone emits apps/admin/server.js for this app.
# It previously read apps/web/server.js — copy-pasted from the web descriptor,
# which would have crash-looped with "Cannot find module '/workspace/apps/web/server.js'".
entrypoint: node apps/admin/server.js

env_variables:
  NODE_ENV: 'production'

automatic_scaling:
  min_instances: 0
  max_instances: 2
  target_cpu_utilization: 0.65

handlers:
  - url: /.*
    script: auto
    secure: always
