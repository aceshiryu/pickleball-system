runtime: nodejs22
# App Engine requires a service literally named `default`, and it must be
# deployed before any other service in the project. The customer web app takes
# that slot: it is also the sanest landing place for a request whose hostname
# matches no dispatch rule.
service: default
instance_class: F2

# App Engine entrypoint: Next standalone emits apps/web/server.js.
entrypoint: node apps/web/server.js

env_variables:
  NODE_ENV: 'production'

automatic_scaling:
  min_instances: 0
  max_instances: 2
  target_cpu_utilization: 0.65

handlers:
  - url: /.*
    script: auto
    secure: always
