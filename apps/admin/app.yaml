runtime: nodejs22
service: pickleball-admin
instance_class: F2

# App Engine entrypoint: Next standalone emits apps/web/server.js.
entrypoint: node apps/web/server.js

env_variables:
  NODE_ENV: 'production'

automatic_scaling:
  min_instances: 0
  max_instances: 2
  target_cpu_utilization: 0.65

handlers:
  - url: /.*
    script: auto
    secure: always
