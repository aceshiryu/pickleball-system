<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pickleball court">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eafff2"/>
      <stop offset="1" stop-color="#d6f5e3"/>
    </linearGradient>
    <linearGradient id="court" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f9d55"/>
      <stop offset="1" stop-color="#12803d"/>
    </linearGradient>
    <linearGradient id="kitchen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f7dd6"/>
      <stop offset="1" stop-color="#2563c9"/>
    </linearGradient>
  </defs>
  <rect width="640" height="480" fill="url(#sky)"/>
  <!-- court in perspective -->
  <polygon points="150,90 490,90 610,430 30,430" fill="url(#court)"/>
  <!-- outer lines -->
  <polygon points="150,90 490,90 610,430 30,430" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.9"/>
  <!-- kitchen (non-volley) zones -->
  <polygon points="196,215 444,215 470,300 170,300" fill="url(#kitchen)" opacity="0.85"/>
  <!-- center + service lines -->
  <line x1="320" y1="90" x2="320" y2="215" stroke="#ffffff" stroke-width="3" opacity="0.85"/>
  <line x1="320" y1="300" x2="320" y2="430" stroke="#ffffff" stroke-width="3" opacity="0.85"/>
  <line x1="170" y1="300" x2="470" y2="300" stroke="#ffffff" stroke-width="4" opacity="0.9"/>
  <line x1="196" y1="215" x2="444" y2="215" stroke="#ffffff" stroke-width="4" opacity="0.9"/>
  <!-- net -->
  <line x1="120" y1="258" x2="520" y2="258" stroke="#0d1b14" stroke-width="4" opacity="0.35"/>
  <g opacity="0.5" stroke="#ffffff" stroke-width="1">
    <line x1="140" y1="240" x2="140" y2="258"/><line x1="180" y1="240" x2="180" y2="258"/>
    <line x1="220" y1="240" x2="220" y2="258"/><line x1="260" y1="240" x2="260" y2="258"/>
    <line x1="300" y1="240" x2="300" y2="258"/><line x1="340" y1="240" x2="340" y2="258"/>
    <line x1="380" y1="240" x2="380" y2="258"/><line x1="420" y1="240" x2="420" y2="258"/>
    <line x1="460" y1="240" x2="460" y2="258"/><line x1="500" y1="240" x2="500" y2="258"/>
  </g>
  <!-- paddle -->
  <g transform="rotate(18 470 360)">
    <rect x="452" y="330" width="40" height="60" rx="20" fill="#f4b23e" stroke="#c17d16" stroke-width="2"/>
    <rect x="466" y="388" width="12" height="26" rx="4" fill="#7a4a17"/>
  </g>
  <!-- ball -->
  <circle cx="250" cy="360" r="16" fill="#f7e02e" stroke="#d8c11f" stroke-width="2"/>
  <g fill="#e7d017"><circle cx="244" cy="354" r="2.2"/><circle cx="256" cy="354" r="2.2"/><circle cx="250" cy="366" r="2.2"/><circle cx="243" cy="365" r="2"/><circle cx="257" cy="365" r="2"/></g>
</svg>
